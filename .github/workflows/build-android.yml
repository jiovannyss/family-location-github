name: Build Android (manual)

# Ръчен билд на Android приложението от текущия `main`.
# Стартира се от GitHub UI: Actions → "Build Android (manual)" → Run workflow.
#
# Output:
#   - debug          → app-debug.apk (sideload-able)
#   - release-aab    → app-release.aab (за Google Play Internal Testing) — изисква signing secrets
#
# GitHub Secrets, нужни за release-aab:
#   ANDROID_KEYSTORE_BASE64    — keystore-ът, кодиран с `base64 -i release.keystore`
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Тип билд'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release-aab

jobs:
  android:
    runs-on: ubuntu-latest

    # Маскира secrets глобално, за да не се появят случайно в logs.
    env:
      ANDROID_KEYSTORE_BASE64:   ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate release secrets
        if: ${{ inputs.build_type == 'release-aab' }}
        run: |
          missing=0
          for v in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!v}" ]; then
              echo "❌ Missing GitHub Secret: $v"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi
          echo "✅ All signing secrets present."

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web bundle
        run: bun run build

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          fi

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Generate native icons & splash from resources/
        run: |
          bunx @capacitor/assets generate \
            --android \
            --iconBackgroundColor '#2A9D8F' \
            --iconBackgroundColorDark '#2A9D8F' \
            --splashBackgroundColor '#FFFFFF' \
            --splashBackgroundColorDark '#FFFFFF'

      - name: Patch AndroidManifest (permissions, hardening)
        run: |
          chmod +x scripts/patch-android-manifest.sh
          ./scripts/patch-android-manifest.sh

      # ----- DEBUG -----
      - name: Gradle assembleDebug
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename debug APK to family-location.apk
        if: ${{ inputs.build_type == 'debug' }}
        run: |
          src=$(ls android/app/build/outputs/apk/debug/*.apk | head -n1)
          cp "$src" "android/app/build/outputs/apk/debug/family-location.apk"

      - name: Upload debug APK
        if: ${{ inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: family-location-android-debug
          path: android/app/build/outputs/apk/debug/family-location.apk
          if-no-files-found: error

      # ----- RELEASE AAB -----
      - name: Setup release signing
        if: ${{ inputs.build_type == 'release-aab' }}
        # Скриптът пише secrets директно във файлове; ехото му е безопасно.
        run: |
          chmod +x scripts/setup-android-signing.sh
          ./scripts/setup-android-signing.sh

      - name: Gradle bundleRelease
        if: ${{ inputs.build_type == 'release-aab' }}
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload release AAB
        if: ${{ inputs.build_type == 'release-aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: family-location-android-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Cleanup signing material
        if: ${{ always() && inputs.build_type == 'release-aab' }}
        run: |
          rm -f android/key.properties
          rm -f "$RUNNER_TEMP/release.keystore" || true
          echo "🧹 Signing material removed from runner."

name: Build Android (manual)

# Ръчен билд на Android приложението от текущия `main`.
# Стартира се от GitHub UI: Actions → "Build Android (manual)" → Run workflow.
#
# Output:
#   - debug          → app-debug.apk (sideload-able)
#   - release-aab    → app-release.aab (за Google Play Internal Testing) — изисква signing secrets
#
# GitHub Secrets, нужни за release-aab:
#   ANDROID_KEYSTORE_BASE64    — keystore-ът, кодиран с `base64 -i release.keystore`
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Тип билд'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release-aab
      enable_push:
        description: 'Активирай Firebase Push (изисква ANDROID_GOOGLE_SERVICES_JSON_BASE64)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  android:
    runs-on: ubuntu-latest

    # Маскира secrets глобално, за да не се появят случайно в logs.
    env:
      ANDROID_KEYSTORE_BASE64:   ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate release secrets
        if: ${{ inputs.build_type == 'release-aab' }}
        run: |
          missing=0
          for v in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!v}" ]; then
              echo "❌ Missing GitHub Secret: $v"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi
          echo "✅ All signing secrets present."

      - name: Validate push secret
        if: ${{ inputs.enable_push == 'true' }}
        run: |
          if [ -z "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "❌ enable_push=true, но липсва GitHub Secret: ANDROID_GOOGLE_SERVICES_JSON_BASE64"
            echo "   Свали google-services.json от Firebase Console и го качи като base64:"
            echo "   base64 -i google-services.json | pbcopy   (macOS)"
            echo "   base64 -w0 google-services.json           (Linux)"
            exit 1
          fi
          echo "✅ Push secret present."

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web bundle
        env:
          VITE_ENABLE_PUSH: ${{ inputs.enable_push == 'true' && 'true' || 'false' }}
        run: |
          echo "🏗  VITE_ENABLE_PUSH=$VITE_ENABLE_PUSH"
          bun run build

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          fi

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Install google-services.json (if push enabled)
        if: ${{ inputs.enable_push == 'true' }}
        run: |
          mkdir -p android/app
          echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
          if [ ! -s android/app/google-services.json ]; then
            echo "❌ Decoded google-services.json е празен — провери base64 съдържанието на secret-а."
            exit 1
          fi
          echo "✅ google-services.json инсталиран в android/app/"

      - name: Generate native icons & splash from resources/
        run: |
          bunx @capacitor/assets generate \
            --android \
            --iconBackgroundColor '#2A9D8F' \
            --iconBackgroundColorDark '#2A9D8F' \
            --splashBackgroundColor '#FFFFFF' \
            --splashBackgroundColorDark '#FFFFFF'

      - name: Patch AndroidManifest (permissions, hardening)
        run: |
          chmod +x scripts/patch-android-manifest.sh
          ./scripts/patch-android-manifest.sh

      - name: Set app version (versionCode/versionName)
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          GRADLE="android/app/build.gradle"
          sed -i "s/versionCode [0-9]\+/versionCode ${RUN_NUMBER}/" "$GRADLE"
          sed -i "s/versionName \"[^\"]*\"/versionName \"1.0.${RUN_NUMBER}\"/" "$GRADLE"
          echo "📱 versionCode=${RUN_NUMBER}, versionName=1.0.${RUN_NUMBER}"
          grep -E "versionCode|versionName" "$GRADLE"

      # ----- DEBUG -----
      - name: Gradle assembleDebug
        if: ${{ inputs.build_type == 'debug' }}
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename debug APK
        if: ${{ inputs.build_type == 'debug' }}
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          src=$(ls android/app/build/outputs/apk/debug/*.apk | head -n1)
          cp "$src" "android/app/build/outputs/apk/debug/family-location-1.0.${RUN_NUMBER}.apk"

      - name: Upload debug APK
        if: ${{ inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: family-location-android-debug-1.0.${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/family-location-1.0.${{ github.run_number }}.apk
          if-no-files-found: error

      # ----- RELEASE AAB -----
      - name: Setup release signing
        if: ${{ inputs.build_type == 'release-aab' }}
        # Скриптът пише secrets директно във файлове; ехото му е безопасно.
        run: |
          chmod +x scripts/setup-android-signing.sh
          ./scripts/setup-android-signing.sh

      - name: Gradle bundleRelease
        if: ${{ inputs.build_type == 'release-aab' }}
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload release AAB
        if: ${{ inputs.build_type == 'release-aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: family-location-android-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Cleanup signing material
        if: ${{ always() && inputs.build_type == 'release-aab' }}
        run: |
          rm -f android/key.properties
          rm -f "$RUNNER_TEMP/release.keystore" || true
          echo "🧹 Signing material removed from runner."

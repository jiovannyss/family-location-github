name: Build Android (manual)

# Ръчен билд на Android приложението от текущия `main` (т.е. от каквото е
# деплойнато на family-location.glowter.com). Стартира се от GitHub UI:
# Actions → "Build Android (manual)" → Run workflow.
#
# Резултат: `app-debug.apk` като артефакт за изтегляне (за инсталация на телефон).
# За production .aab за Google Play е нужен подписващ ключ — виж README.

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Тип билд'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release-unsigned

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web bundle
        run: bun run build

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          fi

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Gradle build
        working-directory: android
        run: |
          chmod +x ./gradlew
          if [ "${{ inputs.build_type }}" = "release-unsigned" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: family-location-android-${{ inputs.build_type }}
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

name: Build iOS (manual)

# End-to-end iOS билд от GitHub Actions macOS runner — НЕ изисква локален Mac.
#
# Режими (workflow_dispatch input `build_type`):
#   validate    → signed archive + .ipa, качва се като GitHub artifact (без TestFlight upload)
#   testflight  → същото + upload към App Store Connect / TestFlight
#
# Всички certificates / profiles / API keys идват САМО от GitHub Secrets.
# Никой чувствителен файл не се commit-ва в repo-то.
#
# Изисквани GitHub Secrets (виж resources/IOS_CI_SETUP.md):
#   IOS_DIST_CERTIFICATE_P12_BASE64
#   IOS_DIST_CERTIFICATE_PASSWORD
#   IOS_PROVISIONING_PROFILE_BASE64
#   IOS_KEYCHAIN_PASSWORD
#   APP_STORE_CONNECT_API_KEY_P8_BASE64
#   APP_STORE_CONNECT_API_KEY_ID
#   APP_STORE_CONNECT_API_ISSUER_ID
#   IOS_TEAM_ID
#   IOS_BUNDLE_ID

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Тип билд'
        required: true
        default: 'validate'
        type: choice
        options:
          - validate
          - testflight

jobs:
  ios:
    runs-on: macos-26

    env:
      IOS_DIST_CERTIFICATE_P12_BASE64:    ${{ secrets.IOS_DIST_CERTIFICATE_P12_BASE64 }}
      IOS_DIST_CERTIFICATE_PASSWORD:      ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64:    ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      IOS_KEYCHAIN_PASSWORD:              ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
      APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
      APP_STORE_CONNECT_API_KEY_ID:       ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID:    ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      IOS_TEAM_ID:                        ${{ secrets.IOS_TEAM_ID }}
      IOS_BUNDLE_ID:                      ${{ secrets.IOS_BUNDLE_ID }}

      KEYCHAIN_PATH: ${{ github.workspace }}/build.keychain-db
      PROFILE_PATH:  ${{ github.workspace }}/profile.mobileprovision
      CERT_PATH:     ${{ github.workspace }}/dist_cert.p12
      ASC_KEY_DIR:   ${{ github.workspace }}/private_keys
      ARCHIVE_PATH:  ${{ github.workspace }}/build/App.xcarchive
      EXPORT_DIR:    ${{ github.workspace }}/build/export
      EXPORT_OPTS:   ${{ github.workspace }}/build/ExportOptions.plist

    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=0
          for v in \
            IOS_DIST_CERTIFICATE_P12_BASE64 \
            IOS_DIST_CERTIFICATE_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64 \
            IOS_KEYCHAIN_PASSWORD \
            APP_STORE_CONNECT_API_KEY_P8_BASE64 \
            APP_STORE_CONNECT_API_KEY_ID \
            APP_STORE_CONNECT_API_ISSUER_ID \
            IOS_TEAM_ID \
            IOS_BUNDLE_ID; do
            if [ -z "${!v}" ]; then
              echo "❌ Missing GitHub Secret: $v"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi
          echo "✅ All required secrets present."

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Select Xcode 26 and verify iOS SDK
        run: |
          set -e

          echo "📦 Налични Xcode инсталации:"
          ls -d /Applications/Xcode*.app 2>/dev/null || true

          # Предпочитаме СТАБИЛЕН Xcode 26 (без 'beta') — beta версиите често
          # нямат инсталирана съответната iOS platform/runtime на runner-а,
          # което води до 'iOS X.Y is not installed'.
          XCODE_STABLE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | grep -vi beta | sort -V | tail -n1 || true)"
          XCODE_ANY26="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n1 || true)"

          XCODE_APP=""
          if [ -n "$XCODE_STABLE" ]; then
            XCODE_APP="$XCODE_STABLE"
          elif [ -n "$XCODE_ANY26" ]; then
            XCODE_APP="$XCODE_ANY26"
            echo "⚠️ Само beta Xcode 26 е наличен — възможни проблеми с липсваща platform."
          fi

          if [ -n "$XCODE_APP" ]; then
            sudo xcode-select -s "$XCODE_APP/Contents/Developer"
            echo "✅ Selected $(basename "$XCODE_APP")"
          else
            echo "ℹ️ Няма /Applications/Xcode_26*.app — ползвам default Xcode."
          fi

          XCODE_VERSION="$(xcodebuild -version | tr '\n' ' ' | sed 's/  */ /g')"
          IOS_SDK_VERSION="$(xcrun --sdk iphoneos --show-sdk-version)"

          echo "🛠️ $XCODE_VERSION"
          echo "📱 iphoneos SDK: $IOS_SDK_VERSION"

          # Покажи какви iOS runtime-и реално са инсталирани
          echo "📲 Инсталирани iOS runtime-и / platforms:"
          xcrun simctl list runtimes 2>/dev/null | grep -i ios || true
          xcodebuild -showsdks 2>/dev/null | grep -i iphoneos || true

          SDK_MAJOR="${IOS_SDK_VERSION%%.*}"
          if [ "$SDK_MAJOR" -lt 26 ]; then
            echo "❌ Runner ползва iOS SDK $IOS_SDK_VERSION, а App Store изисква iOS 26 SDK или по-нов."
            exit 1
          fi

          echo "✅ Xcode / SDK изискването е изпълнено."

          echo "IOS_SDK_VERSION=$IOS_SDK_VERSION" >> "$GITHUB_ENV"

      - name: Ensure iOS device platform is installed
        run: |
          set -e
          # Проверка: 'xcodebuild -showsdks' може да върне SDK-то като инсталирано,
          # но истинският тест е дали 'simctl list runtimes' / DVTDownloadableIndex
          # съдържат iOS device platform. На beta Xcode runner-и платформата често
          # липсва → 'iOS X.Y is not installed'.
          PLATFORM_DIR="$(xcrun --sdk iphoneos --show-sdk-platform-path 2>/dev/null || true)"
          echo "📁 Platform dir: $PLATFORM_DIR"

          NEEDS_DOWNLOAD=0
          if [ -z "$PLATFORM_DIR" ] || [ ! -d "$PLATFORM_DIR/Developer/Library/CoreDevice" ]; then
            NEEDS_DOWNLOAD=1
          fi

          # Допълнителна евристика: SDK-то съществува ли изобщо?
          if ! xcodebuild -showsdks 2>/dev/null | grep -qi "iphoneos"; then
            NEEDS_DOWNLOAD=1
          fi

          if [ "$NEEDS_DOWNLOAD" = "0" ]; then
            echo "✅ iOS device platform изглежда инсталирана."
          else
            echo "⚠️ iOS platform липсва — изтеглям с 'xcodebuild -downloadPlatform iOS'..."
            sudo xcodebuild -downloadPlatform iOS 2>&1 | tail -n 50 || {
              echo "❌ -downloadPlatform fail-на."
              exit 1
            }
            echo "✅ iOS platform изтеглена."
          fi

          echo "📲 SDK-та след проверка:"
          xcodebuild -showsdks 2>/dev/null | grep -i iphoneos || true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web bundle
        run: bun run build

      - name: Add iOS platform (if missing)
        run: |
          if [ ! -d "ios/App" ]; then
            echo "ℹ️ iOS platform missing — adding."
            bunx cap add ios
          else
            echo "✅ iOS platform already present."
          fi

      - name: Sync Capacitor
        run: bunx cap sync ios

      - name: Generate iOS icons & splash from resources/
        run: |
          bunx @capacitor/assets generate \
            --ios \
            --iconBackgroundColor '#2A9D8F' \
            --iconBackgroundColorDark '#2A9D8F' \
            --assetPath resources

      - name: Patch Info.plist with location & background usage descriptions
        run: |
          set -e
          PLIST="ios/App/App/Info.plist"
          PB=/usr/libexec/PlistBuddy

          set_str() {
            local key="$1"; local val="$2"
            $PB -c "Set :$key $val" "$PLIST" 2>/dev/null || \
              $PB -c "Add :$key string $val" "$PLIST"
          }

          set_str NSLocationWhenInUseUsageDescription "Семейна локация използва местоположението ви, за да го споделя с членовете на вашите кръгове, докато приложението е отворено."
          set_str NSLocationAlwaysAndWhenInUseUsageDescription "За да виждат близките ви къде сте в реално време (включително когато приложението е затворено), е нужен достъп „Винаги\". Можете да го изключите по всяко време от Настройки."
          set_str NSLocationAlwaysUsageDescription "Споделяне на местоположение с членовете на вашите кръгове, дори когато приложението работи на заден план."
          set_str NSUserNotificationsUsageDescription "Получавайте съобщения от членовете на кръга си и важни известия за местоположение."

          # UIBackgroundModes array (location, fetch, remote-notification)
          $PB -c "Delete :UIBackgroundModes" "$PLIST" 2>/dev/null || true
          $PB -c "Add :UIBackgroundModes array" "$PLIST"
          $PB -c "Add :UIBackgroundModes:0 string location" "$PLIST"
          $PB -c "Add :UIBackgroundModes:1 string fetch" "$PLIST"
          $PB -c "Add :UIBackgroundModes:2 string remote-notification" "$PLIST"

          echo "✅ Info.plist patched."
          $PB -c "Print" "$PLIST" | grep -E "Location|Background|Notifications" || true

      - name: Patch App.entitlements (Push + APS environment)
        run: |
          set -e
          ENT="ios/App/App/App.entitlements"
          if [ ! -f "$ENT" ]; then
            cat > "$ENT" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          EOF
          else
            /usr/libexec/PlistBuddy -c "Set :aps-environment production" "$ENT" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Add :aps-environment string production" "$ENT"
          fi
          echo "✅ App.entitlements ready."
          cat "$ENT"

      - name: Detect dependency manager (CocoaPods vs SPM)
        id: deps
        run: |
          if [ -f "ios/App/Podfile" ]; then
            echo "manager=cocoapods" >> "$GITHUB_OUTPUT"
            echo "📦 Using CocoaPods (Podfile detected)."
          elif find ios/App -maxdepth 4 -type d -name "CapApp-SPM" | grep -q .; then
            echo "manager=spm" >> "$GITHUB_OUTPUT"
            echo "📦 Using Swift Package Manager (Capacitor 6+)."
          else
            echo "❌ Не мога да открия нито Podfile, нито SPM пакет."
            ls -la ios/App || true
            exit 1
          fi

      - name: Patch Podfile to disable signing on Pods targets
        if: steps.deps.outputs.manager == 'cocoapods'
        working-directory: ios/App
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          podfile = Path("Podfile")
          text = podfile.read_text()

          marker = "# LOVABLE_DISABLE_PODS_SIGNING"
          injection = """
            # LOVABLE_DISABLE_PODS_SIGNING
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
                config.build_settings.delete('PROVISIONING_PROFILE_SPECIFIER')
                config.build_settings.delete('PROVISIONING_PROFILE')
                config.build_settings.delete('DEVELOPMENT_TEAM')
              end
            end
          """.strip("\n")

          if marker in text:
              print("ℹ️ Podfile already patched.")
              raise SystemExit(0)

          match = re.search(r"^post_install do \|installer\|\s*$", text, flags=re.MULTILINE)
          if match:
              insert_at = match.end()
              text = text[:insert_at] + "\n" + injection + text[insert_at:]
          else:
              text = text.rstrip() + "\n\npost_install do |installer|\n" + injection + "\nend\n"

          podfile.write_text(text)
          print("✅ Podfile patched.")
          PY
          sed -n '/post_install do |installer|/,+20p' Podfile

      - name: Install CocoaPods (only if Podfile exists)
        if: steps.deps.outputs.manager == 'cocoapods'
        working-directory: ios/App
        run: pod install --repo-update

      # ----- Signing material setup -----
      - name: Preflight PKCS12 secrets check
        run: |
          set +x
          echo "$IOS_DIST_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          if [ -n "$IOS_DIST_CERTIFICATE_PASSWORD" ]; then
            echo "✅ IOS_DIST_CERTIFICATE_PASSWORD is non-empty."
          else
            echo "❌ IOS_DIST_CERTIFICATE_PASSWORD is empty."
            exit 1
          fi

          CERT_SIZE=$(stat -f%z "$CERT_PATH")
          CERT_SHA256=$(shasum -a 256 "$CERT_PATH" | awk '{print $1}')
          echo "📦 Decoded .p12 size: ${CERT_SIZE} bytes"
          echo "🔐 Decoded .p12 SHA256: ${CERT_SHA256}"

          if ! openssl pkcs12 -info -in "$CERT_PATH" -nokeys -passin pass:"$IOS_DIST_CERTIFICATE_PASSWORD" >/dev/null 2>&1; then
            echo "❌ PKCS12 preflight failed: decoded file and password do not match."
            exit 1
          fi

          echo "✅ PKCS12 preflight passed."

      - name: Create temporary keychain & import certificate
        run: |
          set +x
          PEM_PATH="$RUNNER_TEMP/dist_cert.pem"
          COMPAT_CERT_PATH="$RUNNER_TEMP/dist_cert_compat.p12"

          # macOS runner има LibreSSL по подразбиране (без -legacy флаг).
          # Използваме Homebrew OpenSSL 3, който поддържа -legacy.
          OPENSSL_BIN="$(brew --prefix openssl@3)/bin/openssl"
          if [ ! -x "$OPENSSL_BIN" ]; then
            echo "❌ Homebrew openssl@3 не е намерен на $OPENSSL_BIN"
            exit 1
          fi
          echo "🔧 Using $($OPENSSL_BIN version)"

          # Преекспортираме до legacy-съвместим формат за macOS security import.
          "$OPENSSL_BIN" pkcs12 -in "$CERT_PATH" \
            -passin pass:"$IOS_DIST_CERTIFICATE_PASSWORD" \
            -nodes -legacy \
            -out "$PEM_PATH"

          "$OPENSSL_BIN" pkcs12 -export \
            -in "$PEM_PATH" \
            -out "$COMPAT_CERT_PATH" \
            -passout pass:"$IOS_DIST_CERTIFICATE_PASSWORD" \
            -legacy \
            -keypbe PBE-SHA1-3DES \
            -certpbe PBE-SHA1-3DES \
            -macalg sha1 \
            -name "Apple Distribution"

          # Create temporary keychain
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list (запазваме existing keychains)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Import certificate
          security import "$COMPAT_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_DIST_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Allow codesign да чете ключа без UI prompt
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$IOS_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" >/dev/null

          # Изтрий .p12 от диска
          rm -f "$CERT_PATH"
          rm -f "$PEM_PATH"
          rm -f "$COMPAT_CERT_PATH"

          echo "✅ Keychain ready."

      - name: Install provisioning profile
        run: |
          set +x
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          # Извлечи UUID и копирай под правилното име
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" \
            /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          if [ -z "$UUID" ]; then
            echo "❌ Could not extract UUID from provisioning profile."
            exit 1
          fi
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "PROFILE_UUID=$UUID" >> "$GITHUB_ENV"
          echo "✅ Provisioning profile installed (UUID=$UUID)."

      - name: Install App Store Connect API key
        run: |
          set +x
          mkdir -p "$ASC_KEY_DIR"
          KEY_PATH="$ASC_KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          HOME_KEY_DIR="$HOME/private_keys"
          HOME_KEY_PATH="$HOME_KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          if printf '%s' "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s\n' "$APP_STORE_CONNECT_API_KEY_P8_BASE64" > "$KEY_PATH"
            echo "ℹ️ ASC key secret appears to be raw .p8 content; saved without base64 decoding."
          else
            printf '%s' "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
            echo "ℹ️ ASC key secret appears to be base64; decoded successfully."
          fi

          KEY_PATH="$KEY_PATH" python3 - <<'PY'
          from pathlib import Path
          import os, sys

          key_path = Path(os.environ['KEY_PATH'])
          try:
            content = key_path.read_text(encoding='utf-8')
          except UnicodeDecodeError:
            print('❌ App Store Connect API key is not valid UTF-8 text after processing.')
            print('   Secret APP_STORE_CONNECT_API_KEY_P8_BASE64 is likely in the wrong format.')
            sys.exit(1)

          normalized = content.strip()
          if 'BEGIN PRIVATE KEY' not in normalized or 'END PRIVATE KEY' not in normalized:
            print('❌ App Store Connect API key does not look like a valid .p8 private key.')
            print('   Expected PEM text with BEGIN/END PRIVATE KEY markers.')
            sys.exit(1)

          print('✅ ASC API key file validated as UTF-8 PEM text.')
          PY

          chmod 600 "$KEY_PATH"
          mkdir -p "$HOME_KEY_DIR"
          cp "$KEY_PATH" "$HOME_KEY_PATH"
          chmod 600 "$HOME_KEY_PATH"
          echo "✅ ASC API key installed in runner and home private_keys directory."

      # ----- Patch App target signing settings (App target ONLY, not frameworks) -----
      - name: Apply signing settings ONLY to App target
        working-directory: ios/App
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
        run: |
          set -e
          # xcodeproj ruby gem е стандартен за CocoaPods; на macos-14 runner-а вече е наличен.
          if ! gem list -i xcodeproj >/dev/null 2>&1; then
            sudo gem install xcodeproj --no-document
          fi
          ruby <<'RUBY'
          require 'xcodeproj'
          project_path = 'App.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == 'App' }
          raise "App target not found" unless target
          target.build_configurations.each do |config|
            bs = config.build_settings
            bs['CODE_SIGN_STYLE'] = 'Manual'
            bs['DEVELOPMENT_TEAM'] = ENV['TEAM_ID']
            bs['PROVISIONING_PROFILE_SPECIFIER'] = ENV['PROFILE_UUID']
            bs['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
            bs['CODE_SIGN_IDENTITY[sdk=iphoneos*]'] = 'Apple Distribution'
            bs['PRODUCT_BUNDLE_IDENTIFIER'] = ENV['BUNDLE_ID']
            bs['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
            puts "  #{config.name}: signing configured."
          end
          project.save
          puts "✅ App target patched (frameworks untouched)."
          RUBY

      # ----- Set app version -----
      - name: Set app version (CFBundleVersion / CFBundleShortVersionString)
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${RUN_NUMBER}" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${RUN_NUMBER}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.${RUN_NUMBER}" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.0.${RUN_NUMBER}" "$PLIST"
          echo "📱 CFBundleVersion=${RUN_NUMBER}, CFBundleShortVersionString=1.0.${RUN_NUMBER}"

      # ----- Generate ExportOptions.plist -----
      - name: Generate ExportOptions.plist
        run: |
          mkdir -p "$(dirname "$EXPORT_OPTS")"
          cat > "$EXPORT_OPTS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>export</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF
          echo "✅ ExportOptions.plist created."

      # ----- Archive -----
      - name: xcodebuild archive (device)
        working-directory: ios/App
        run: |
          # При SPM няма .xcworkspace — ползваме .xcodeproj директно.
          if [ -d "App.xcworkspace" ]; then
            PROJECT_FLAG=(-workspace App.xcworkspace)
          else
            PROJECT_FLAG=(-project App.xcodeproj)
          fi
          xcodebuild \
            "${PROJECT_FLAG[@]}" \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      # ----- Export .ipa -----
      - name: xcodebuild -exportArchive
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist "$EXPORT_OPTS" \
            -exportPath "$EXPORT_DIR" \
            -allowProvisioningUpdates \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Locate .ipa
        id: ipa
        run: |
          IPA=$(ls "$EXPORT_DIR"/*.ipa | head -n1)
          if [ -z "$IPA" ]; then
            echo "❌ No .ipa produced."
            exit 1
          fi
          echo "ipa_path=$IPA" >> "$GITHUB_OUTPUT"
          echo "📦 IPA: $IPA"

      - name: Upload .ipa as artifact
        uses: actions/upload-artifact@v4
        with:
          name: family-location-ios-${{ inputs.build_type }}-1.0.${{ github.run_number }}
          path: ${{ steps.ipa.outputs.ipa_path }}
          if-no-files-found: error

      # ----- Validate срещу App Store (винаги, безопасно) -----
      - name: Validate .ipa against App Store
        if: ${{ inputs.build_type == 'validate' || inputs.build_type == 'testflight' }}
        env:
          IPA_PATH: ${{ steps.ipa.outputs.ipa_path }}
          # altool чете .p8 от ./private_keys или ~/private_keys
          API_PRIVATE_KEYS_DIR: ${{ env.ASC_KEY_DIR }}
        run: |
          set +x
          xcrun altool --validate-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"

      # ----- TestFlight upload (само при testflight) -----
      - name: Upload to TestFlight
        if: ${{ inputs.build_type == 'testflight' }}
        env:
          IPA_PATH: ${{ steps.ipa.outputs.ipa_path }}
          API_PRIVATE_KEYS_DIR: ${{ env.ASC_KEY_DIR }}
        run: |
          set +x
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"
          echo "🚀 Uploaded to TestFlight."

      # ----- Cleanup -----
      - name: Cleanup signing material
        if: always()
        run: |
          set +x
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$PROFILE_PATH" || true
          rm -f "$CERT_PATH" || true
          rm -f "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8" || true
          rmdir "$HOME/private_keys" 2>/dev/null || true
          if [ -n "$PROFILE_UUID" ]; then
            rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision" || true
          fi
          rm -rf "$ASC_KEY_DIR" || true
          echo "🧹 Cleanup done."
